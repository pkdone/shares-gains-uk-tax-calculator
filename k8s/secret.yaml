apiVersion: v1
kind: Secret
metadata:
  name: shares-gains-app-secrets
  labels:
    app: shares-gains-uk-tax-calculator
type: Opaque
stringData:
  # Replace with your Atlas URI (database name must be in the URI path).
  MONGODB_URI: "mongodb+srv://user:password@cluster.example.mongodb.net/mydb?retryWrites=true&w=majority"
  # Session signing secret (at least 32 characters). Generate with: openssl rand -base64 32
  BETTER_AUTH_SECRET: "replace-with-a-long-random-secret-min-32-chars"
